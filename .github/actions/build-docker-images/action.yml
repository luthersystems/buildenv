name: Build Docker Images
description: A custom action to build Docker images for specified platforms and images
inputs:
  arch:
    description: The platform architecture
    required: true
  image:
    description: The image to build
    required: true
  git_tag:
    description: Git release tag
    default: ""
  git_rev:
    description: Git commit hash
    default: ""

runs:
  using: composite
  steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Install Docker (ARM runners)
      if: runner.arch == 'ARM64'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ca-certificates curl gnupg make
        sudo install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        sudo chmod a+r /etc/apt/keyrings/docker.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
        sudo apt-get update
        sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
        sudo chmod 666 /var/run/docker.sock

    - name: Configure DockerHub
      uses: ./.github/actions/configure-dockerhub

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        platforms: linux/${{ inputs.arch }}

    # Buildx's `type=gha` cache backend needs the ACTIONS_* runtime env vars
    # (ACTIONS_RUNTIME_TOKEN plus either ACTIONS_CACHE_URL for cache v1 or
    # ACTIONS_RESULTS_URL for cache v2), which GitHub does not export to
    # shell steps by default. Re-export every ACTIONS_* variable via the
    # first-party actions/github-script action so buildx can talk to
    # whichever cache backend the runner is configured for.
    - name: Expose GHA runtime to buildx (for type=gha cache backend)
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
      with:
        script: |
          for (const [k, v] of Object.entries(process.env)) {
            if (k.startsWith('ACTIONS_') && v) core.exportVariable(k, v);
          }

    - name: Build docker image for ${{ inputs.arch }}
      shell: bash
      env:
        BUILDX_CACHE_FLAGS: --cache-from type=gha,scope=${{ inputs.image }}-${{ inputs.arch }} --cache-to type=gha,mode=max,scope=${{ inputs.image }}-${{ inputs.arch }}
      run: cd images && make PLATFORMS=linux/${{ inputs.arch }} TAG_SUFFIX=-${{ inputs.arch }} GIT_TAG=${{ inputs.git_tag }} GIT_REVISION=${{ inputs.git_rev }} ${{ inputs.image }}
