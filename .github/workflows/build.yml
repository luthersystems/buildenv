name: Build docker images
on:
  pull_request:
    branches:
      - main
env:
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}

jobs:
  build:
    name: ${{ matrix.image }} - ${{ matrix.arch }} docker build
    runs-on: ${{ fromJSON('{"arm64":"2vcpu-ubuntu-2204-arm","amd64":"ubuntu-22.04"}')[matrix.arch] }}
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
        image:
          - build-api
          - build-go
          - build-go-alpine
          - build-godynamic
          - build-e2e
          - build-java
          - build-js
          - build-swaggercodegen
          - nginx-frontend
          - service-base-alpine
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Build container
        uses: ./.github/actions/build-docker-images
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.image }}
          git_rev: $GITHUB_SHA

  cve-scan:
    name: CVE scan (${{ matrix.image }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        image:
          - build-api
          - build-go
          - build-go-alpine
          - service-base-alpine
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Configure DockerHub
        uses: ./.github/actions/configure-dockerhub
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4
      - name: Expose GHA runtime to buildx (for type=gha cache backend)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            for (const [k, v] of Object.entries(process.env)) {
              if (k.startsWith('ACTIONS_') && v) core.exportVariable(k, v);
            }
      - name: Build image for scan (amd64, loaded locally)
        run: |
          cd images && make \
            PLATFORMS=linux/amd64 \
            DOCKER_BUILDX_OPTS=--load \
            GIT_REVISION=${{ github.sha }} \
            ${{ matrix.image }}
      # Record the FULL CVE picture (every severity, fixable AND unfixable) and
      # publish it per run: a quickview breakdown to the job step summary plus a
      # full SARIF artifact. These steps are non-blocking (continue-on-error, so a
      # transient Scout/auth error never reds the job or skips the gate) and run
      # BEFORE the hard gate, so totals are recorded even when the gate fails on a
      # fixable HIGH/CRITICAL. NOTE: this records per run only; durable trend
      # tracking would mean feeding the SARIF to the code-scanning Security tab.
      - name: Record total CVE breakdown (all severities, non-blocking)
        uses: docker/scout-action@7520205ff60037fdc436b40b6a1d1e55a839ec2d  # v1.22.0
        continue-on-error: true
        with:
          command: quickview
          image: local://luthersystems/${{ matrix.image }}:${{ github.sha }}
          summary: true
          exit-code: false
          write-comment: false
          dockerhub-user: ${{ env.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Generate full CVE SARIF (all severities, non-blocking)
        uses: docker/scout-action@7520205ff60037fdc436b40b6a1d1e55a839ec2d  # v1.22.0
        continue-on-error: true
        with:
          command: cves
          image: local://luthersystems/${{ matrix.image }}:${{ github.sha }}
          sarif-file: scout-cves-${{ matrix.image }}.sarif
          summary: false
          exit-code: false
          write-comment: false
          dockerhub-user: ${{ env.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Upload full CVE SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        continue-on-error: true
        with:
          name: scout-cves-${{ matrix.image }}
          path: scout-cves-${{ matrix.image }}.sarif
          if-no-files-found: warn

      # Hard gate: fail the build on any FIXABLE HIGH/CRITICAL CVE.
      - name: Scan with Docker Scout (fail on fixable HIGH/CRITICAL)
        uses: docker/scout-action@7520205ff60037fdc436b40b6a1d1e55a839ec2d  # v1.22.0
        with:
          command: cves
          image: local://luthersystems/${{ matrix.image }}:${{ github.sha }}
          only-severities: critical,high
          only-fixed: true
          exit-code: true
          write-comment: false
          dockerhub-user: ${{ env.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ env.DOCKERHUB_TOKEN }}
