name: Scout drift watch

# Layer 2 of keeping the required images at grade A (see README "Image security
# policies"). The PR gate (build.yml) and release gate (publish.yml) only fire on
# code changes — but a CVE disclosed today against an UNCHANGED pin drops the
# grade with no commit to trigger a scan. This cron re-evaluates the real Docker
# Scout policy grade on the published `:latest` images, opens/refreshes a tracking
# issue + reds the run on drift, and auto-closes it on recovery.
#
# It also enforces the customer remediation SLA (.github/scout-sla.json): it
# classifies the WORST fixable severity (Critical/High) behind the drift, labels
# the issue, and ESCALATES (sla:at-risk / sla:breached + a comment) as the
# 15-day (Critical) / 30-day (High) deadline approaches — so a fixable finding
# that needs a human-reviewed PR can never silently blow the SLA. Runs DAILY (not
# weekly) precisely so the clock is checked every day.
on:
  schedule:
    - cron: "17 6 * * *" # daily 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

env:
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}

jobs:
  drift:
    name: Docker Scout drift watch (published :latest)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Configure DockerHub
        uses: ./.github/actions/configure-dockerhub
      - name: Install Docker Scout CLI
        run: curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --
      - name: Evaluate Scout policy + worst fixable severity on each required :latest image
        id: scan
        env:
          DOCKER_SCOUT_HUB_USER: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKER_SCOUT_HUB_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -uo pipefail
          drift=0
          worst="none" # severity ranking: none < high < critical
          vex_dir=".github/vex"
          {
            echo "## Docker Scout policy drift on published \`:latest\` images"
            echo
            echo "Re-evaluated by the daily \`Scout drift watch\` workflow."
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
          } > summary.md
          for img in $(jq -r '.required[]' .github/scout-required-images.json); do
            ref="luthersystems/${img}:latest"
            echo "::group::scout $ref"
            # --- Grade (authoritative + VEX-honoring) ---
            # Docker Scout analyzes a (re)published tag asynchronously, so a fresh
            # :latest can transiently report "No policy evaluation results found" —
            # a race, NOT a grade drop. Same failure #89 (92c0a31) fixed for the
            # release gate in publish.yml; the daily watch was missed and treated
            # the transient state as "below grade A", opening a false drift issue.
            # Mirror the fix: poll `docker scout policy` until results appear (up to
            # ~15 min), then let --exit-code decide. A real violation exits non-zero
            # WITHOUT the "no results" marker, so it is recorded immediately (never
            # waits the window). `docker scout policy` is the only Scout surface
            # that honors OpenVEX (server-side, via the pushed attestation), so it
            # is the authoritative grade; the raw `cves` probe below is VEX-blind.
            deadline=$(( SECONDS + 900 ))
            policy=""
            while :; do
              rc=0
              out="$(docker scout policy "$ref" --org luthersystems --exit-code 2>&1)" || rc=$?
              printf '%s\n' "$out"
              if [ "$rc" -eq 0 ]; then
                policy="✅ grade A"; break
              fi
              if printf '%s' "$out" | grep -qiE 'no policy .*results'; then
                if [ "$SECONDS" -ge "$deadline" ]; then
                  echo "::warning::Scout policy results for $ref never became available (~15 min) — flagging as drift so it stays visible; usually clears next run once Scout finishes analyzing."
                  policy="⚠️ no policy results (Scout not ready)"; drift=1; break
                fi
                echo "Policy results not ready for $ref; retrying in 30s..."
                sleep 30
                continue
              fi
              policy="❌ below grade A"; drift=1; break
            done

            # --- Worst fixable severity for the SLA clock (VEX-aware, crash-safe) ---
            # `docker scout cves --exit-code` returns exactly 2 when fixable
            # findings exist, 0 when none. Two bugs the old code had, both fixed:
            # (1) the runner uses `bash -e` and `set -uo pipefail` does NOT clear
            # -e, so a bare `cves …; rc=$?` let the rc=2 abort the whole step
            # mid-loop — that is what crashed the watch on build-godynamic (its
            # VEX-waived CVE-2026-34040 makes cves exit 2) and stopped it opening
            # an issue; guard with set +e/set -e. (2) raw `cves` cannot honor
            # OpenVEX, so it would count that waived finding and spoof the SLA
            # severity — subtract this image's not_affected waivers (same jq as
            # scripts/scout-cve-gate.sh) before classifying.
            waived=""
            if compgen -G "${vex_dir}/"'*.json' >/dev/null 2>&1; then
              waived="$(jq -r --arg key "$img" '
                  .statements[]? | select(.status == "not_affected")
                  | select([.products[]?."@id" // empty] | map(test("/" + $key + "(@|$)")) | any)
                  | .vulnerability.name' "${vex_dir}"/*.json 2>/dev/null | sort -u || true)"
            fi
            crit="no"; high="no"
            for sev in critical high; do
              set +e
              out="$(docker scout cves "$ref" --only-fixed --only-severity "$sev" --exit-code 2>/dev/null)"; rc=$?
              set -e
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
                echo "::warning::scout cves $sev probe errored (rc=$rc) for $ref"; continue
              fi
              [ "$rc" -eq 2 ] || continue   # rc=0 → nothing fixable at this severity
              present="$(printf '%s' "$out" | grep -oE 'CVE-[0-9]{4}-[0-9]+|GHSA-[0-9a-z]{4}-[0-9a-z]{4}-[0-9a-z]{4}' | sort -u || true)"
              # Fail-safe toward escalation: Scout says fixable findings exist but
              # we parsed no IDs to match against VEX → count as present, never
              # under-report the SLA severity.
              if [ -z "$present" ]; then
                if [ "$sev" = critical ]; then crit="yes"; else high="yes"; fi
                continue
              fi
              unwaived="$(comm -23 <(printf '%s\n' "$present" | sed '/^$/d') <(printf '%s\n' "$waived" | sed '/^$/d') || true)"
              if [ -n "$unwaived" ]; then
                if [ "$sev" = critical ]; then crit="yes"; else high="yes"; fi
              fi
            done
            if [ "$crit" = "yes" ]; then worst="critical"; fi
            if [ "$high" = "yes" ] && [ "$worst" != "critical" ]; then worst="high"; fi
            echo "- \`${img}\` — ${policy}; fixable Critical: ${crit}, fixable High: ${high}" >> summary.md
            echo "::endgroup::"
          done
          echo "drift=${drift}" >> "$GITHUB_OUTPUT"
          echo "worst_severity=${worst}" >> "$GITHUB_OUTPUT"
          echo "----- summary -----"; cat summary.md
      # Issue/SLA state machine + Slack #alert egress live in
      # scripts/scout-drift-sla.cjs (logic stays out of workflow YAML). Slack
      # alerts for the drift/SLA lifecycle are posted INLINE from this watch —
      # not from an issues:-triggered workflow — because this issue is created
      # with the default GITHUB_TOKEN, whose events do NOT trigger other
      # workflows (GitHub's anti-recursion guard). Best-effort egress: no-op
      # until SLACK_ALERT_WEBHOOK_URL is set; a Slack outage never fails the
      # watch (the issue + labels remain the durable SLA record).
      - name: Open/refresh the drift issue + enforce the remediation SLA
        if: steps.scan.outputs.drift == '1'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          WORST_SEVERITY: ${{ steps.scan.outputs.worst_severity }}
          SLACK_ALERT_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK_URL }}
        with:
          script: |
            const run = require('./scripts/scout-drift-sla.cjs');
            await run({ github, context, core });
      - name: Close the drift issue on recovery
        # Fully clean scan (drift == '0') → auto-close any open scout-drift
        # issue so the loop self-resets, and post the ✅ all-clear to Slack.
        # Logic in scripts/scout-drift-recovery.cjs.
        if: steps.scan.outputs.drift == '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          SLACK_ALERT_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK_URL }}
        with:
          script: |
            const run = require('./scripts/scout-drift-recovery.cjs');
            await run({ github, context, core });
      - name: Fail the run if drift detected
        if: steps.scan.outputs.drift == '1'
        run: |
          echo "::error::One or more published images dropped below Docker Scout grade A — see the 'scout-drift' issue."
          exit 1
      # Silence must never look green: if the watch ITSELF errored (scan crash,
      # API failure — yesterday's #90 class), say so in Slack. Excludes the
      # deliberate drift failure right above (drift == '1'), which already
      # alerted with full context from the SLA step.
      - name: Alert Slack if the watch itself errored
        if: failure() && steps.scan.outputs.drift != '1'
        env:
          SLACK_ALERT_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK_URL }}
        run: |
          bash scripts/slack-alert.sh "⚠️ *Scout drift watch errored* — the watch itself broke (no drift verdict; silence is not green). <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
