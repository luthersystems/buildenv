name: Build and Push
on:
  push:
    tags:
      - "*"
env:
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
jobs:
  build:
    name: ${{ matrix.image }} - ${{ matrix.arch }} docker build & push
    runs-on: ${{ fromJSON('{"arm64":"2vcpu-ubuntu-2204-arm","amd64":"ubuntu-22.04"}')[matrix.arch] }}
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
        image:
          - build-api
          - build-go
          - build-go-alpine
          - build-godynamic
          - build-e2e
          - build-java
          - build-js
          - build-swaggercodegen
          - nginx-frontend
          - service-base-alpine
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Build & push container
        uses: ./.github/actions/build-docker-images
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.image }}
          git_tag: $GITHUB_REF_NAME

  push-manifests:
    runs-on: ubuntu-22.04
    needs:
      - build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Configure DockerHub
        uses: ./.github/actions/configure-dockerhub
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4
      - name: Create and push manifest for multiarch
        run: cd images && make push-manifests GIT_TAG=$GITHUB_REF_NAME

  # Single source of truth for the grade-A image set, shared with the PR gate
  # in build.yml. Add a service in .github/scout-required-images.json, not here.
  scout-config:
    name: Resolve Docker Scout image lists
    runs-on: ubuntu-22.04
    outputs:
      required: ${{ steps.lists.outputs.required }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Load Docker Scout image lists
        id: lists
        run: |
          set -euo pipefail
          f=.github/scout-required-images.json
          jq -e . "$f" >/dev/null
          echo "required=$(jq -c '.required' "$f")" >> "$GITHUB_OUTPUT"

  # Classify the release: automation-cut (interim) vs human-cut. Automation
  # (claude[bot]) cuts PATCH releases to ship a strictly-better rebuild even while
  # a fixable CVE still awaits its human-reviewed PR — that interim image improves
  # posture but may not yet be grade A. So the two grade gates below are
  # REPORT-ONLY for interim releases (the daily Scout drift watch + the SLA
  # escalation in .github/scout-sla.json are the enforcement) and stay HARD for
  # human-cut releases (deliberate releases must be pristine). Safe default: if no
  # release/author is found, interim=false → the hard gate applies.
  release-meta:
    name: Classify release (interim vs human)
    runs-on: ubuntu-22.04
    outputs:
      interim: ${{ steps.who.outputs.interim }}
    steps:
      - name: Determine if this release was cut by automation (claude[bot])
        id: who
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = context.ref.replace('refs/tags/', '');
            let interim = false;
            try {
              const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              interim = !!(rel.data.author && rel.data.author.login === 'claude[bot]');
              core.info(`Release ${tag} author=${rel.data.author && rel.data.author.login} → interim=${interim}`);
            } catch (e) {
              core.info(`No release found for ${tag} (${e.status || e}) → human/strict gate`);
            }
            core.setOutput('interim', String(interim));

  cve-scan:
    name: CVE scan published image (${{ matrix.image }})
    runs-on: ubuntu-22.04
    needs:
      - push-manifests
      - scout-config
      - release-meta
    # Report-only for automation's interim releases (see release-meta); hard for human releases.
    continue-on-error: ${{ needs.release-meta.outputs.interim == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.scout-config.outputs.required) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Configure DockerHub
        uses: ./.github/actions/configure-dockerhub
      - name: Install Docker Scout CLI
        run: curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --
      # VEX-aware release CVE gate -- mirrors the PR-time gate in build.yml.
      # The previous raw `docker/scout-action cves --exit-code` could NOT honor
      # OpenVEX, so once Scout analyzed the pushed image it re-flagged
      # build-godynamic's waived CVE-2026-34040 at release time even though the
      # PR gate passed it (run 28482425988, attempt 2). Reuse the same
      # scripts/scout-cve-gate.sh so the release and PR gates agree: it lists
      # fixable CRITICAL/HIGH findings and drops only those waived by an OpenVEX
      # not_affected statement under .github/vex/ (fail-closed on any scan/parse
      # error). Auth via the Configure DockerHub step above plus the Scout env.
      - name: VEX-aware CVE gate on published image (${{ matrix.image }})
        env:
          DOCKER_SCOUT_HUB_USER: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKER_SCOUT_HUB_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        run: bash scripts/scout-cve-gate.sh "luthersystems/${{ matrix.image }}:${{ github.ref_name }}" "${{ matrix.image }}"

  # Release-time TRUE grade-A gate. The Docker Scout health grade (A–F) and its
  # supply-chain-attestation / approved+up-to-date base-image / high-profile-CVE
  # / license policies are computed registry-side on the PUSHED image, so this is
  # the only place the real "A A A" bill of health can be enforced (a PR's local
  # --load image structurally can't carry attestations, so it can't grade A).
  # `docker scout policy --exit-code` returns non-zero if ANY org policy is
  # non-compliant on the published image. Escape hatch if an UNFIXABLE CVE or a
  # newly-added low-weight policy ever blocks an otherwise-good release: scope
  # with `--only-policy <slug,...>`, or temporarily add `continue-on-error: true`.
  # Runs on the required grade-A set from .github/scout-required-images.json.
  scout-policy:
    name: Scout policy grade (${{ matrix.image }})
    runs-on: ubuntu-22.04
    needs:
      - push-manifests
      - scout-config
      - release-meta
    # Report-only for automation's interim releases (see release-meta); hard for human releases.
    continue-on-error: ${{ needs.release-meta.outputs.interim == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.scout-config.outputs.required) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Configure DockerHub
        uses: ./.github/actions/configure-dockerhub
      - name: Install Docker Scout CLI
        run: curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --
      # Attach any OpenVEX not_affected statement for this image as an image
      # attestation BEFORE policy evaluation. `docker scout policy` has no
      # --vex-location flag (unlike the PR-time `cves` gate), so the only way it
      # honors a VEX waiver is server-side via an attestation on the pushed image.
      # Best-effort (continue-on-error): if the attach can't run (registry
      # referrer / containerd-store limits) the policy step still runs and an
      # unwaived finding trips it -- report-only for automation's interim releases
      # (release-meta), and for a human release the escape hatch above
      # (--only-policy / temporary continue-on-error) or a Scout dashboard
      # exception applies. Validated at the next release. See
      # docs/upstream-cve-backlog.md.
      - name: Attach OpenVEX attestations (if any) for ${{ matrix.image }}
        continue-on-error: true
        env:
          DOCKER_SCOUT_HUB_USER: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKER_SCOUT_HUB_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE: ${{ matrix.image }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          found=0
          for f in ".github/vex/${IMAGE}.openvex.json" ".github/vex/${IMAGE}-"*.openvex.json; do
            [ -e "$f" ] || continue
            found=1
            echo "Attaching OpenVEX $f to luthersystems/${IMAGE}:${REF}"
            docker scout attestation add \
              --file "$f" \
              --predicate-type https://openvex.dev/ns/v0.2.0 \
              --org luthersystems \
              --referrer \
              "luthersystems/${IMAGE}:${REF}"
          done
          [ "$found" = 0 ] && echo "No OpenVEX docs for ${IMAGE}; nothing to attach."
      - name: Evaluate Docker Scout policies on the published image
        env:
          DOCKER_SCOUT_HUB_USER: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKER_SCOUT_HUB_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -uo pipefail
          ref="luthersystems/${{ matrix.image }}:${{ github.ref_name }}"
          # Docker Scout analyzes a pushed image asynchronously, so right after
          # push the policy evaluation for a freshly-pushed tag may not exist yet
          # ("No policy evaluation results found"). That is a transient race, not
          # a grade failure -- on run 28482425988 build-go PASSED on attempt 1 and
          # hit this on attempt 2. Poll until results appear, then let --exit-code
          # decide. A real policy violation exits non-zero WITHOUT the "no results"
          # marker, so it still fails fast (never waits the full window).
          deadline=$(( SECONDS + 900 ))   # give Scout up to ~15 min to analyze
          attempt=0
          while :; do
            attempt=$(( attempt + 1 ))
            rc=0
            out="$(docker scout policy "$ref" --org luthersystems --exit-code 2>&1)" || rc=$?
            printf '%s\n' "$out"
            if [ "$rc" -eq 0 ]; then
              echo "Policy PASS for $ref (attempt $attempt)."
              exit 0
            fi
            if printf '%s' "$out" | grep -qiE 'no policy .*results'; then
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "::error::Scout policy results for $ref never became available (~15 min). Re-run this job."
                exit 1
              fi
              echo "Policy results not ready for $ref (attempt $attempt); retrying in 30s..."
              sleep 30
              continue
            fi
            echo "::error::Docker Scout policy is non-compliant for $ref."
            exit "$rc"
          done

  # Gate the release on supply-chain attestations actually being present on the
  # PUBLISHED multi-arch image. The Makefile attaches SBOM + provenance during
  # the per-arch build, but `make push-manifests` (buildx imagetools create)
  # re-assembles the index and is the step that can silently DROP the
  # attestation manifests. This job is the automated replacement for inspecting
  # the image by hand: it fails the release if any platform is missing either
  # predicate, so a regression in the combine step can never ship unnoticed.
  verify-attestations:
    name: Verify attestations (${{ matrix.image }})
    runs-on: ubuntu-22.04
    needs:
      - push-manifests
    strategy:
      fail-fast: false
      matrix:
        image:
          - build-api
          - build-go
          - build-go-alpine
          - build-godynamic
          - build-e2e
          - build-java
          - build-js
          - build-swaggercodegen
          - nginx-frontend
          - service-base-alpine
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Configure DockerHub
        uses: ./.github/actions/configure-dockerhub
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4
      - name: Verify SBOM + provenance attestations on published image
        env:
          IMG: luthersystems/${{ matrix.image }}:${{ github.ref_name }}
          REPO: luthersystems/${{ matrix.image }}
        run: |
          set -euo pipefail
          echo "Inspecting $IMG"
          RAW=$(docker buildx imagetools inspect "$IMG" --raw)

          # Count real platform images vs sibling attestation manifests. buildx
          # emits one attestation manifest per platform, tagged in the index
          # with annotation vnd.docker.reference.type=attestation-manifest.
          PLATS=$(echo "$RAW" | jq '[.manifests[]
            | select((.annotations["vnd.docker.reference.type"] // "") != "attestation-manifest")
            | select((.platform.os // "") != "unknown")] | length')
          ATTS=$(echo "$RAW" | jq '[.manifests[]
            | select((.annotations["vnd.docker.reference.type"] // "") == "attestation-manifest")] | length')
          echo "platform images=$PLATS  attestation manifests=$ATTS"

          if [ "$ATTS" -lt 1 ] || [ "$ATTS" -ne "$PLATS" ]; then
            echo "::error::$IMG is missing attestation manifests (platforms=$PLATS, attestations=$ATTS). 'buildx imagetools create' likely dropped them — check images/Makefile push-manifests."
            echo "$RAW" | jq .
            exit 1
          fi

          # For each attestation manifest, confirm BOTH predicate types are
          # present (provenance + SBOM), not just one. Uses --raw so it does not
          # depend on the runner's buildx supporting the .SBOM/.Provenance
          # format fields.
          MISSING=0
          for DGST in $(echo "$RAW" | jq -r '.manifests[]
              | select((.annotations["vnd.docker.reference.type"] // "") == "attestation-manifest")
              | .digest'); do
            AM=$(docker buildx imagetools inspect "${REPO}@${DGST}" --raw)
            PTYPES=$(echo "$AM" | jq -r '.layers[].annotations["in-toto.io/predicate-type"] // empty')
            echo "  $DGST predicate-types: $(echo "$PTYPES" | paste -sd, -)"
            echo "$PTYPES" | grep -q 'slsa.dev/provenance' || { echo "::error::$IMG attestation $DGST missing provenance predicate"; MISSING=1; }
            echo "$PTYPES" | grep -qE 'spdx.dev/Document|cyclonedx' || { echo "::error::$IMG attestation $DGST missing SBOM predicate"; MISSING=1; }
          done
          [ "$MISSING" -eq 0 ] || exit 1
          echo "✅ $IMG carries SBOM + provenance for all $PLATS platform(s)"
